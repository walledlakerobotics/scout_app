<!DOCTYPE html>

<head>
  <link rel="stylesheet" type="text/css" href="../CSS/global.css">
  <link rel="stylesheet" type="text/css" href="../CSS/Index-login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
    rel="stylesheet">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<div class="tv-static"></div>

<body>
  <div class="main">
    <div class="text-container">
      <h1 class="tc-formatted">WLR Scouting</h1>
      <h2 class="tc-formatted">Enter access code to continue</h1>
        <div class="main-buttons">
          <input placeholder="Enter code.." id="codeInput"></input>
          <button id="submitBtn" class="mainBtn">Submit →</button>
          <div class="error hidden" id="errMsg"></div>
        </div>
    </div>
    <footer>
      <div class="footer">
        <a href="https://walledlakerobotics.com">
          <button class="mini-btn">
            <ion-icon name="arrow-back-circle-outline"></ion-icon>
          </button>
        </a>
        <a href="https://github.com/walledlakerobotics/walledlakerobotics.github.io">
          <button class="mini-btn">
            <ion-icon name="logo-github"></ion-icon>
          </button>
        </a>
        <button class="mini-btn" onclick="toggleTheme()">
          <ion-icon name="sunny"></ion-icon>
        </button>
      </div>
      <p class="tc-formatted footer">© 2025 Walled Lake Robotics</p>
  </div>
  </footer>

  <script src="../JS/theme.js"></script>
  <script src="../JS/login.js"></script>
</body>
